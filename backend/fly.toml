# fly.toml app configuration file generated for cellarsage-api on 2026-05-04T21:07:45+09:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cellarsage-api'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
