name: Cellar Sage Weekly Sync

on:
  # Every Sunday at 16:00 UTC (Monday 01:30 ACST)
  schedule:
    - cron: "0 16 * * 0"

  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      merchant:
        description: 'Merchant to sync (leave blank for all)'
        required: false
        default: ''

jobs:
  sync:
    name: Scrape - Normalise - Upsert
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/sync/requirements.txt

      - name: Run sync engine
        working-directory: backend
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
        run: |
          python -c "import sync; import sync.main; print('sync:', sync.__file__); print('sync.main:', sync.main.__file__)"
          python -m sync.main
